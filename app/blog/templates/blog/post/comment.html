{% extends "blog/base.html" %}

{% block title %}Add a comment{% endblock %}

{% block content %}
  <!-- Comment result card -->
  <div class="rounded-[12px] border border-gray-200 bg-white px-4 py-6 shadow-sm sm:px-6 dark:border-gray-800 dark:bg-gray-900 dark:shadow-black/20">
    {% if comment %}
      <!-- Success message -->
      <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Your comment has been added.</h2>
      <p class="mt-2 text-sm">
        <a href="{{ post.get_absolute_url }}" class="text-blue-600 transition-colors hover:underline dark:text-indigo-400 dark:hover:text-indigo-300">Back to the post</a>
      </p>
    {% else %}
      <!-- Comment form include -->
      {% include "blog/post/includes/comment_form.html" %}
    {% endif %}
  </div>
{% endblock %}
