<ul class="space-y-2">
    {% for post in latest_posts %}
        <li>
            <a href="{{ post.get_absolute_url }}"
               class="text-blue-600 transition-colors hover:underline dark:text-indigo-400 dark:hover:text-indigo-300">
                {{ post.title }}
            </a>
        </li>
    {% endfor %}
</ul>
